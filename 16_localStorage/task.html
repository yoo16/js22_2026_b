<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ToDo List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Zen Kaku Gothic New"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        ink: '#1c1f26',
                    },
                },
            },
        };
    </script>
</head>
<body class="bg-slate-100 text-ink font-sans antialiased">
    <main class="max-w-2xl mx-auto px-5 py-10 sm:py-14">

        <!-- ヘッダー -->
        <header class="mb-8">
            <p class="font-mono text-xs tracking-widest text-indigo-500 mb-2">TASK MANAGER</p>
            <h1 class="text-3xl sm:text-4xl font-black tracking-tight">ToDo リスト</h1>
        </header>

        <!-- 入力行 -->
        <section class="mb-4">
            <div class="flex gap-2">
                <input id="newTodo" type="text" placeholder="タスクを入力"
                    class="flex-1 rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm shadow-sm
                    focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent"
                    autocomplete="off" />
                <button id="addBtn"
                    class="w-12 rounded-xl bg-indigo-600 text-white text-xl font-medium shadow-sm
                    hover:bg-indigo-700 transition-colors shrink-0">
                    ＋
                </button>
            </div>
        </section>

        <!-- フィルタ -->
        <section class="mb-4 flex items-center justify-between">
            <div id="filterButtons" class="inline-flex rounded-lg border border-slate-200 bg-white p-1 shadow-sm">
                <button data-filter="all"
                    class="filter-btn rounded-md px-3 py-1.5 text-sm font-medium text-slate-600 transition-colors">
                    すべて
                </button>
                <button data-filter="active"
                    class="filter-btn rounded-md px-3 py-1.5 text-sm font-medium text-slate-600 transition-colors">
                    未完了
                </button>
                <button data-filter="done"
                    class="filter-btn rounded-md px-3 py-1.5 text-sm font-medium text-slate-600 transition-colors">
                    完了
                </button>
            </div>
            <div class="text-sm text-slate-500 font-mono" id="count">0</div>
        </section>

        <!-- リスト -->
        <section class="mb-4">
            <p class="text-xs text-slate-400 mb-2">タスクをダブルクリックで編集できます。</p>
            <ul id="list"
                class="divide-y divide-slate-200 bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
            </ul>
        </section>

        <!-- フッター -->
        <footer class="flex flex-wrap items-center justify-end gap-2">
            <button id="clearDone"
                class="px-3 py-2 text-sm rounded-lg border border-slate-300 bg-white text-slate-600
                hover:bg-slate-50 transition-colors shadow-sm">
                完了を一括削除
            </button>
            <button id="clearAll"
                class="px-3 py-2 text-sm rounded-lg border border-slate-300 bg-white text-rose-600
                hover:bg-rose-50 transition-colors shadow-sm">
                すべて削除
            </button>
        </footer>

    </main>
    <!-- すべてのJSを1本化 -->
    <script src="js/task.js" defer></script>
</body>
</html>
