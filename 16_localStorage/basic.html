<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LocalStorage デモ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Zen Kaku Gothic New"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        ink: '#1c1f26',
                        panel: '#14161c',
                    },
                },
            },
        };
    </script>
</head>
<body class="bg-slate-100 text-ink font-sans antialiased">
    <main class="max-w-3xl mx-auto px-5 py-10 sm:py-14">
        <!-- ヘッダー -->
        <header class="mb-10">
            <p class="font-mono text-xs tracking-widest text-indigo-500 mb-2">WEB STORAGE API</p>
            <h1 class="text-3xl sm:text-4xl font-black tracking-tight">localStorage デモ</h1>
            <p class="mt-3 text-sm text-slate-500 leading-relaxed">
                ボタンを押すと <code class="px-1.5 py-0.5 bg-slate-200 rounded text-[13px] font-mono">localStorage</code>
                にデータを保存・読込・削除します。下の「ストレージの中身」は実際に保存されている生データです。
            </p>
        </header>
        <div class="grid sm:grid-cols-2 gap-4 mb-6">
            <!-- テキスト -->
            <section class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-2 h-2 rounded-full bg-indigo-500"></span>
                    <h2 class="text-base font-bold">テキスト</h2>
                </div>
                <p class="text-xs text-slate-400 mb-3 font-mono">key: "note" / string</p>
                <input id="note-input" type="text" placeholder="保存するテキストを入力"
                    class="w-full mb-3 px-3 py-2 rounded-lg border border-slate-300 text-sm
                    focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent" />
                <div class="flex flex-wrap gap-2">
                    <button data-action="save-text"
                        class="px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700 transition-colors">
                        保存
                    </button>
                    <button data-action="load-text"
                        class="px-4 py-2 rounded-lg border border-slate-300 text-sm font-medium hover:bg-slate-50 transition-colors">
                        読込
                    </button>
                    <button data-action="remove-text"
                        class="px-4 py-2 rounded-lg border border-slate-300 text-sm font-medium text-rose-600 hover:bg-rose-50 transition-colors">
                        削除
                    </button>
                </div>
            </section>
            <!-- オブジェクト -->
            <section class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-2 h-2 rounded-full bg-amber-500"></span>
                    <h2 class="text-base font-bold">オブジェクト</h2>
                </div>
                <p class="text-xs text-slate-400 mb-3 font-mono">key: "list" / {name, age}[]</p>

                <!-- 複数フィールドの入力（name: string, age: number） -->
                <div class="grid grid-cols-[1fr_84px] gap-2 mb-2">
                    <input id="member-name" type="text" placeholder="名前"
                        class="px-3 py-2 rounded-lg border border-slate-300 text-sm
                        focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
                    <input id="member-age" type="number" placeholder="年齢" min="0" max="150"
                        class="px-3 py-2 rounded-lg border border-slate-300 text-sm
                        focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
                </div>
                <button data-action="add-member"
                    class="w-full mb-3 px-3 py-2 rounded-lg border border-amber-300 text-amber-700 text-sm font-medium
                    hover:bg-amber-50 transition-colors">
                    ＋ このメンバーを追加
                </button>

                <ul id="member-draft" class="mb-3 space-y-1.5 empty:hidden"></ul>

                <div class="flex flex-wrap gap-2">
                    <button data-action="save-list"
                        class="px-4 py-2 rounded-lg bg-amber-500 text-white text-sm font-medium hover:bg-amber-600 transition-colors">
                        保存
                    </button>
                    <button data-action="load-list"
                        class="px-4 py-2 rounded-lg border border-slate-300 text-sm font-medium hover:bg-slate-50 transition-colors">
                        読込
                    </button>
                    <button data-action="remove-list"
                        class="px-4 py-2 rounded-lg border border-slate-300 text-sm font-medium text-rose-600 hover:bg-rose-50 transition-colors">
                        削除
                    </button>
                </div>
            </section>
        </div>
        <!-- 結果 -->
        <section class="mb-6">
            <h2 class="text-xs font-bold text-slate-500 tracking-wide mb-2">結果</h2>
            <div id="output"
                class="p-4 bg-white border border-slate-200 rounded-2xl min-h-[80px] text-sm leading-relaxed
                whitespace-pre-wrap font-mono text-slate-700 shadow-sm transition-colors"
                role="status" aria-live="polite">(ここに結果が表示されます)</div>
        </section>
        <!-- ストレージインスペクタ（signature element） -->
        <section>
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-xs font-bold text-slate-500 tracking-wide">ストレージの中身（自動更新）</h2>
                <button data-action="clear-all"
                    class="text-xs font-mono text-slate-400 hover:text-rose-500 transition-colors">
                    全て削除
                </button>
            </div>
            <div id="inspector"
                class="bg-panel rounded-2xl p-4 font-mono text-[13px] leading-relaxed shadow-sm overflow-x-auto">
                <!-- JS が中身を描画 -->
            </div>
        </section>
    </main>
    <!-- 振る舞いは別ファイルで -->
    <script src="js/basic.js"></script>
</body>
</html>
