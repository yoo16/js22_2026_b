<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="relative min-h-screen overflow-hidden bg-black text-white antialiased">
    <div class="pointer-events-none fixed inset-0 z-10">
        <header
            class="absolute left-4 right-4 top-4 flex items-start justify-between gap-4 md:left-6 md:right-6 md:top-6">
            <section
                class="pointer-events-auto w-64 max-w-[calc(100vw-2rem)] rounded-lg border border-white/15 bg-slate-950/75 p-4 shadow-2xl shadow-black/40 backdrop-blur-md">
                <p class="text-xs font-semibold uppercase tracking-[0.18em] text-orange-200/80">Three.js demo</p>
                <h1 class="mt-1 text-xl font-bold leading-tight text-white">Solar System</h1>
                <p class="mt-2 text-sm leading-6 text-slate-300">惑星名を選択すると、カメラがその惑星を追跡します。</p>
            </section>
        </header>

        <nav id="planetList"
            class="pointer-events-auto absolute bottom-4 left-4 w-64 max-w-[calc(100vw-2rem)] rounded-lg border border-white/15 bg-slate-950/75 p-3 shadow-2xl shadow-black/40 backdrop-blur-md md:bottom-6 md:left-6">
            <button id="resetButton" type="button"
                class="pointer-events-auto rounded-lg border border-white/15 bg-white/10 px-4 py-2 text-sm font-semibold text-white shadow-xl shadow-black/30 backdrop-blur-md transition hover:bg-white/20 focus:outline-none focus:ring-2 focus:ring-orange-300">
                Reset Zoom
            </button>
            <h2 class="py-4 px-2 text-sm font-semibold text-white">Planets</h2>
            <ul class="grid max-h-72 gap-1 overflow-y-auto pr-1"></ul>
        </nav>

        <div
            class="pointer-events-none absolute bottom-4 right-4 hidden max-w-sm rounded-lg border border-white/10 bg-black/35 px-4 py-3 text-sm leading-6 text-slate-300 backdrop-blur-md md:block">
            軌道は白いライン、太陽は中央の光源として描画されています。
        </div>
    </div>

    <!-- three.js ライブラリ -->
    <script src="https://unpkg.com/three@0.152.0/build/three.min.js"></script>
    <!-- planetData を定義した外部ファイル -->
    <script src="js/planetData.js"></script>
    <!-- メインの three.js のコード -->
    <script src="js/planet.js"></script>
</body>

</html>
